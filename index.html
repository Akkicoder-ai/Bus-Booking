<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bus Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Bus Booking</h2>

<form onsubmit="handleFormSubmit(event)" class="form-container">

    <!-- Left Column -->
    <div class="form-left">
        <label>Name:</label>
        <input type="text" id="username" required>

        <label>Email:</label>
        <input type="email" id="email" required>

        <label>Phone:</label>
        <input type="tel" id="phone" required>

        <label>Select Car Number:</label>
        <select id="car" required>
            <option value="">--Select Car Number--</option>
            <option value="Bus1">Bus1</option>
            <option value="Bus2">Bus2</option>
            <option value="Bus3">Bus3</option>
            <option value="Bus4">Bus4</option>
        </select>
    </div>

    <!-- Right Column -->
    <div class="form-right">
        <button type="submit">Book</button>

        <label>Filter:</label>
        <select id="filterBus" onchange="filterUsers()">
            <option value="All">All</option>
            <option value="Bus1">Bus1</option>
            <option value="Bus2">Bus2</option>
            <option value="Bus3">Bus3</option>
            <option value="Bus4">Bus4</option>
        </select>
    </div>

</form>

<ul id="userList"></ul>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.5.1/axios.min.js"></script>
<script src="app.js"></script>

</body>
</html>
